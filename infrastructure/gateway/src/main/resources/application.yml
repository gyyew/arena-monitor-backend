server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
        - id: post-service
          uri: lb://post-service
          predicates:
            - Path=/api/v1/posts/**
        - id: court-service
          uri: lb://court-service
          predicates:
            - Path=/api/v1/courts/**

# JWT configuration (same as user-service)
jwt:
  secret: mySecretKeyForJWTTokenGenerationMustBeLongEnough256Bits!
  expiration: 86400000

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
