server:
  port: 8082

spring:
  application:
    name: user-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/micro_user?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

spring.cloud.nacos.discovery:
  server-addr: localhost:8848
  namespace: ''
  group: DEFAULT_GROUP

spring.cloud.nacos.config:
  server-addr: localhost:8848
  namespace: ''
  group: DEFAULT_GROUP

# JWT Configuration
jwt:
  secret: mySecretKeyForJWTTokenGenerationMustBeLongEnough256Bits!
  expiration: 86400000  # 24 hours in milliseconds