server:
  port: 8083
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: post-service
  datasource:
    url: jdbc:mysql://localhost:3306/post_service?useSSL=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&connectionCharacterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        enabled: false
    compatibility-verifier:
      enabled: false

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.post.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Feign configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
      user-service:
        connectTimeout: 5000
        readTimeout: 10000
  circuitbreaker:
    enabled: true
  # Enable Feign client scanning
  # This tells Spring to scan for @FeignClient annotated interfaces
  default-path-matching:
    pattern-service-id: .*-service

logging:
  level:
    com.example.post.feign: DEBUG
